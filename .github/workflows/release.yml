name: Release

# Triggered by pushing a semver tag like v0.51.3.
# Create the tag with: pnpm release 0.51.3
# (see scripts/release.mjs — it bumps versions, commits, tags, and prints push instructions)

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  id-token: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}  Version: ${VERSION}"

      - name: Verify package.json versions match tag
        shell: bash
        run: |
          EXPECTED="${{ steps.meta.outputs.version }}"
          DESKTOP=$(node -p "require('./apps/desktop/package.json').version")
          CLI=$(node -p "require('./packages/cli/package.json').version")
          CARGO=$(grep -m1 '^version' apps/desktop/src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          FAIL=0
          if [ "$DESKTOP" != "$EXPECTED" ]; then echo "::error::apps/desktop/package.json is $DESKTOP, expected $EXPECTED"; FAIL=1; fi
          if [ "$CLI" != "$EXPECTED" ]; then echo "::error::packages/cli/package.json is $CLI, expected $EXPECTED"; FAIL=1; fi
          if [ "$CARGO" != "$EXPECTED" ]; then echo "::error::Cargo.toml is $CARGO, expected $EXPECTED"; FAIL=1; fi
          if [ $FAIL -ne 0 ]; then echo "Run: pnpm version-bump $EXPECTED  and re-tag."; exit 1; fi
          echo "All versions match $EXPECTED"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping create."
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "TerraStudio ${{ steps.meta.outputs.version }}" \
              --generate-notes \
              --verify-tag
          fi

  build-release:
    needs: create-release
    # Windows-only for now. Re-enable Linux (ubuntu-22.04) and macOS
    # (macos-latest with aarch64-apple-darwin target) by adding them back
    # to the matrix below.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseName: 'TerraStudio ${{ needs.create-release.outputs.version }}'
          releaseBody: 'See release notes below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Upload portable zip on Windows
      - name: Create portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cd apps/desktop/src-tauri/target/release
          7z a -tzip "TerraStudio-${{ needs.create-release.outputs.version }}-portable-x64.zip" app.exe
      - name: Upload portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" "apps/desktop/src-tauri/target/release/TerraStudio-${{ needs.create-release.outputs.version }}-portable-x64.zip" --clobber

  build-cli:
    needs: create-release
    # Windows-only for now. Re-enable Linux/macOS CLI binaries by adding
    # them back to the matrix (node22-linux-x64 / node22-macos-arm64 /
    # node22-macos-x64). The npm package is still published and works
    # cross-platform via Node.js.
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node22-win-x64
            artifact: tstudio-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Bundle CLI (esbuild → CJS)
        working-directory: packages/cli
        run: pnpm bundle

      - name: Package CLI binary
        working-directory: packages/cli
        shell: bash
        run: >
          ./node_modules/.bin/pkg bundle/cli.cjs
          --targets ${{ matrix.target }}
          --output bin/tstudio

      - name: Rename binary with version
        working-directory: packages/cli/bin
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          if [ -f "tstudio.exe" ]; then
            mv tstudio.exe "tstudio-${VERSION}-win-x64.exe"
          else
            SUFFIX="${{ matrix.artifact }}"
            mv tstudio "tstudio-${VERSION}-${SUFFIX#tstudio-}"
          fi

      - name: Upload CLI binary to release
        working-directory: packages/cli/bin
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          TAG="${{ needs.create-release.outputs.tag }}"
          gh release upload "$TAG" tstudio-${VERSION}-* --clobber

  publish-cli-npm:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Bundle CLI (esbuild → self-contained CJS)
        working-directory: packages/cli
        run: pnpm bundle

      - name: Publish @afroze9/terrastudio-cli to npm
        working-directory: packages/cli
        run: npm publish --provenance --access public
